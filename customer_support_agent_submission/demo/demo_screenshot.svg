<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#111827"/>
  <rect x="36" y="32" width="1128" height="696" rx="8" fill="#0b1020" stroke="#374151"/>
  <circle cx="70" cy="66" r="7" fill="#ef4444"/>
  <circle cx="94" cy="66" r="7" fill="#f59e0b"/>
  <circle cx="118" cy="66" r="7" fill="#22c55e"/>
  <text x="56" y="112" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="22">$ python support_agent.py "I still cannot login. My ticket is AUTH-1001"</text>
  <text x="56" y="172" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">Thanks for reaching out. I can help with that.</text>
  <text x="56" y="222" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">I found ticket AUTH-1001: Customer cannot log in after password reset.</text>
  <text x="56" y="262" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">It is currently In Progress with high priority.</text>
  <text x="56" y="322" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">Latest note: Password reset succeeded, but the customer may be blocked</text>
  <text x="56" y="362" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">by stale browser session cookies.</text>
  <text x="56" y="422" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">Recommended next step: try incognito mode, clear site cookies,</text>
  <text x="56" y="462" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">and confirm whether the MFA prompt appears.</text>
  <text x="56" y="522" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="22">Relevant KnowledgeBase guidance:</text>
  <text x="56" y="572" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">- Login troubleshooting: Try normal and incognito/private windows.</text>
  <text x="56" y="612" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">- Password reset guidance: Use the newest reset email.</text>
  <text x="56" y="672" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="22">ReAct tools: scratchpad -> create_ticket -> search_knowledge_base -> update_knowledge_base</text>
</svg>
